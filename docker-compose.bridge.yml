# Add this service block to the OpenClaw Coolify service docker-compose
# Or deploy as a separate Coolify service pointing to the Git repo

services:
  claude-bridge:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - BRIDGE_SECRET=${BRIDGE_SECRET}
      - REQUIRE_APPROVAL=${REQUIRE_APPROVAL:-true}
      - CLAUDE_MAX_TOKENS=${CLAUDE_MAX_TOKENS:-4000}
      - WORKSPACE=/workspace
      - CLAUDE_CONFIG_DIR=/workspace/.claude
      - BRIDGE_TELEGRAM_POLL=false
    volumes:
      - bridge-workspace:/workspace
    healthcheck:
      test: [CMD, curl, -sf, "http://127.0.0.1:8765/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  claude-relay:
    build:
      context: .
      dockerfile: Dockerfile.relay
    environment:
      - OPENCLAW_URL=${OPENCLAW_URL:-wss://openclaw.theaiconsultant.co.uk}
      - OPENCLAW_USER=${OPENCLAW_USER}
      - OPENCLAW_PASS=${OPENCLAW_PASS}
      - OPENCLAW_TOKEN=${OPENCLAW_TOKEN}
      - OPENCLAW_SESSION=${OPENCLAW_SESSION:-agent:main:main}
      - BRIDGE_URL=${BRIDGE_URL:-http://claude-bridge:8765}
      - BRIDGE_SECRET=${BRIDGE_SECRET}
    depends_on:
      claude-bridge:
        condition: service_healthy
    restart: unless-stopped

volumes:
  bridge-workspace:
